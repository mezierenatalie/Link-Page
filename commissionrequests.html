<!-- Sets the document type to an html file, and must be the first line of code -->
<!DOCTYPE html>

<!-- Sets the page language to english, and is important for screen readers -->
<html lang="en">

<!-- Opens the head section of the code, it is behind the scenes instructions for the browser and includes the style section of the code-->
<head>

    <!-- Sets the character set to the default UTF-8 so that none of the text characters display as weird symbols -->
    <meta charset="UTF-8">

    <!-- Makes the page responsive on mobile and auto fits the page to the devices width -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title that displays on the browser tab -->
    <title>Commission Request</title>

    <!-- Preconnects to the font server so that the fonts can load faster -->
    <link rel="preconnect" href="https://db.onlinewebfonts.com">

    <!-- Loads the font "Genty Sans" from the font server -->
    <link href="https://db.onlinewebfonts.com/c/fea031a5eb1f633a622138fe25624d42?family=Genty+Sans" rel="stylesheet">

    <!-- Links to stylesheet "linkpagesstyles.css" -->
    <link rel="stylesheet" href="linkpagestyles.css">

    <link rel="stylesheet" href="commissionrequeststyles.css">

    <!-- Links to javascript "commisionrequestscript.js" -->

</head>
